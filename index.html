<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>SubTracker</title>
<meta name="theme-color" content="#0f172a" />
<link rel="manifest" href="./manifest.json" />
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="SubTracker" />
<style>
  :root {
    --bg: #0f172a;
    --surface: #16213b;
    --surface-2: #1c2a4a;
    --border: #2a3a5f;
    --text: #e6ebf5;
    --text-dim: #97a4c0;
    --accent: #4f8cff;
    --danger: #ff6b6b;
    --warning: #ffb347;
    --ok: #45c98a;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
    padding-bottom: 96px;
  }
  header {
    position: sticky;
    top: 0;
    z-index: 5;
    background: var(--bg);
    padding: env(safe-area-inset-top, 16px) 16px 8px;
    border-bottom: 1px solid var(--border);
  }
  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  h1 { font-size: 22px; margin: 0; }
  #summary { color: var(--text-dim); font-size: 13px; margin: 4px 0 12px; }
  .tabs { display: flex; gap: 8px; padding-bottom: 12px; overflow-x: auto; }
  .tabs button {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 13px;
    white-space: nowrap;
  }
  .tabs button.active { background: var(--accent); color: white; border-color: var(--accent); }
  .icon-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 13px;
  }
  main { padding: 12px 16px 24px; max-width: 640px; margin: 0 auto; }
  #sync-status { color: var(--text-dim); font-size: 12px; margin-bottom: 10px; }
  #list { display: flex; flex-direction: column; gap: 10px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .vendor { margin: 0; font-size: 17px; }
  .notes { margin: 2px 0 0; font-size: 13px; color: var(--text-dim); }
  .pill {
    flex-shrink: 0;
    font-size: 12px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 999px;
  }
  .pill.danger { background: rgba(255,107,107,0.15); color: var(--danger); }
  .pill.warning { background: rgba(255,179,71,0.15); color: var(--warning); }
  .pill.ok { background: rgba(69,201,138,0.15); color: var(--ok); }
  .pill.muted { background: rgba(151,164,192,0.15); color: var(--text-dim); }
  .card-meta { display: flex; gap: 6px; flex-wrap: wrap; font-size: 13px; color: var(--text-dim); margin-top: 10px; }
  .card-meta.secondary { margin-top: 8px; }
  .tag {
    background: var(--surface-2);
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 12px;
  }
  .tag.status-cancelled, .tag.status-expired { opacity: 0.7; }
  .card-actions { display: flex; gap: 16px; margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; }
  .btn-text { background: none; border: none; color: var(--accent); font-size: 13px; padding: 0; }
  .btn-text.danger { color: var(--danger); }
  #empty { text-align: center; color: var(--text-dim); padding: 60px 20px; }
  .fab {
    position: fixed;
    right: 20px;
    bottom: calc(env(safe-area-inset-bottom, 0) + 20px);
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    font-size: 28px;
    border: none;
    box-shadow: 0 6px 16px rgba(0,0,0,0.4);
    z-index: 6;
  }
  dialog#modal {
    border: none;
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
    width: min(420px, 92vw);
    padding: 20px;
  }
  dialog#modal::backdrop { background: rgba(0,0,0,0.6); }
  #modal h2 { margin: 0 0 14px; font-size: 18px; }
  .field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
  .field label { font-size: 12px; color: var(--text-dim); }
  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1; }
  input, select, textarea {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 9px 10px;
    font-size: 15px;
    font-family: inherit;
  }
  .modal-actions { display: flex; justify-content: space-between; margin-top: 16px; gap: 10px; }
  .modal-actions-right { display: flex; gap: 10px; margin-left: auto; }
  button.primary {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 14px;
  }
  button.secondary {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 14px;
  }
  #delete-btn { background: transparent; color: var(--danger); border: none; font-size: 14px; }
</style>
</head>
<body>
<header>
  <div class="header-row">
    <h1>SubTracker</h1>
    <button id="refresh-btn" class="icon-btn">Refresh</button>
  </div>
  <div id="summary"></div>
  <div class="tabs">
    <button data-filter="active" class="active">Active</button>
    <button data-filter="all">All</button>
    <button data-filter="cancelled">Cancelled</button>
    <button data-filter="expired">Expired</button>
  </div>
</header>

<main>
  <div id="sync-status"></div>
  <div id="list"></div>
  <p id="empty" hidden>No subscriptions in this view.</p>
</main>

<button class="fab" id="add-btn" aria-label="Add subscription">+</button>

<dialog id="modal">
  <h2 id="modal-title">Add subscription</h2>
  <form id="sub-form">
    <div class="field">
      <label for="vendor">Vendor</label>
      <input id="vendor" name="vendor" required autocomplete="off" />
    </div>
    <div class="field">
      <label for="planNotes">Plan / notes</label>
      <input id="planNotes" name="planNotes" autocomplete="off" />
    </div>
    <div class="field-row">
      <div class="field">
        <label for="cost">Cost</label>
        <input id="cost" name="cost" type="number" step="0.01" min="0" />
      </div>
      <div class="field">
        <label for="billingCycle">Billing cycle</label>
        <select id="billingCycle" name="billingCycle">
          <option value="monthly">Monthly</option>
          <option value="annual">Annual</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label for="keyDate">Key date</label>
      <input id="keyDate" name="keyDate" type="date" required />
    </div>
    <div class="field-row">
      <div class="field">
        <label for="autoRenews">Auto-renews?</label>
        <select id="autoRenews" name="autoRenews">
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>
      </div>
      <div class="field">
        <label for="intendedAction">Intended action</label>
        <select id="intendedAction" name="intendedAction">
          <option value="renew">Renew</option>
          <option value="cancel">Cancel</option>
          <option value="undecided">Undecided</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label for="status">Status</label>
      <select id="status" name="status">
        <option value="active">Active</option>
        <option value="expired">Expired</option>
        <option value="cancelled">Cancelled</option>
      </select>
    </div>
    <div class="modal-actions">
      <button type="button" id="delete-btn" hidden>Delete</button>
      <div class="modal-actions-right">
        <button type="button" id="cancel-btn" class="secondary">Cancel</button>
        <button type="submit" class="primary">Save</button>
      </div>
    </div>
  </form>
</dialog>

<script src="./app.js"></script>
</body>
</html>
